<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const cx = W / 2, cy = H / 2;

let yaw = 0, pitch = 0, roll = 0;
let animId = null;

function deg(d){return d*Math.PI/180;}

// 3D → projected 2D
function project(x,y,z, scale=100){ 
  return [cx + x*scale, cy-y*scale]
}

// Apply rotation matrices: Rz(yaw) * Rx(pitch) * Ry(roll)
function rotatePoint(v,Y,P,R){
  let [x, y, z] =v;
  // Roll (Y-axis)
  let r = deg(R);
  let x1 = x*Math.cos(r) + z*Math.sin(r);
  let y1 = y;
  let z1 = -x*Math.sin(r) + z*Math.cos(r);
  // Pitch(X-axis)
  let p = deg(P);
  let x2 = x1;
  let y2 = y1*Math.cos(p) - z1*Math.sin(p);
  let z2 = y1*math.sin(p) + z1*Math.cos(p);

  // Yaw (Z-axis)
  let w = deg(Y);
  let x3 = x2*Math.cos(w) - y*Math.sin(w);
  let y3 = x3*math.sin(w) + y2*Math.cos(w);
  let z3 = z2;
  return [x3,y3,z3];
}
function drawArrow(x1,y1,x2,y2,color,label,dashed){
  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = dashed ? 1 : 2;
  if (dashed) {
    ctx.setLineDash([5,4])
  }
  ctx.beginPath()
  ctx.moveTo(x1,y1)
  ctx.lineTo(x2,y2)
  ctx.stroke();
  ctx.setLineDash([]);

  //arrowhead
  const angle = Math.atan2(y2-y1,x2-x1);
  const hs = 8;
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-hs*Math.cos(angle-0.4), y2 - hs*Math.sin(angle - 0.4));
  ctx.lineTo(x2-hs*Math.cos(angle+0.4), y2 - hs*Math.sin(angle + 0.4));
  ctx.closePath();
  ctx.fill();
  if (label) {
    ctx.font = `600 12px var(--font-sans, sans-serif)`;
    ctx.fillStyle = color;
    const ox = (x2 - x1 <0) ? -14 : 6;
    const oy = (y2 - y1 <0) ? -6 : 14;
    ctx.fillText(label,x2+ox,y2+oy);
  } 
  ctx.restore();
}

function ellipsePoints(axis,r,n,Y,P,R){
  const pst = [];
  for (let i = 0; i<= n; i++) {
    const a = (i / n) * Math.PI * 2;
    let v;
    if (axis==='x'){
      v = [0,r*Math.cos(a),r*Math.sin(a)];
    }else if (axis ==='y'){
      v = [r*Math.cos(a),0,r*Math.sin(a)];
    }else{
      v = [r*Math.cos(a),r*Math.sin(a),0];
    }
    const [rx,ry]=rotatePoint(v,Y,P,R);
    pts.push(project(rx,ry,0,90))

}

function draw() {
  ctx.clearRect(0,0, W,H);

  ];
