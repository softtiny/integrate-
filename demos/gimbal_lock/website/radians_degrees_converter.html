<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radians ↔ Degrees Converter</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg2: #f5f4f0;
    --bg3: #eeede9;
    --text: #1a1a18;
    --text2: #6b6a64;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --blue: #378ADD;
    --amber: #EF9F27;
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252523;
      --bg3: #2e2e2b;
      --text: #e8e6de;
      --text2: #9c9a92;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 2rem 1.5rem; max-width: 720px; margin: 0 auto; line-height: 1.6; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.5rem; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
  .card { background: var(--bg2); border-radius: var(--radius-lg); padding: 1rem 1.25rem; }
  .card label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 6px; }
  .card input { width: 100%; font-size: 22px; font-weight: 500; background: none; border: none; outline: none; color: var(--text); font-family: 'SF Mono', 'Fira Code', monospace; }
  .formula { background: var(--bg2); border-radius: var(--radius-md); padding: 0.75rem 1rem; font-size: 13px; color: var(--text2); margin-bottom: 1.25rem; display: flex; gap: 2rem; flex-wrap: wrap; }
  .formula span { color: var(--text); font-weight: 500; font-family: 'SF Mono', 'Fira Code', monospace; }
  .angles-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
  .ang-btn { font-size: 12px; padding: 4px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius-md); cursor: pointer; background: var(--bg); color: var(--text2); transition: background 0.15s; }
  .ang-btn:hover { background: var(--bg2); }
  svg text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: var(--text); }
  .ts { font-size: 12px; fill: var(--text2); }
  .th { font-size: 14px; font-weight: 500; fill: var(--text); }
  .t  { font-size: 14px; fill: var(--text); }
  .arr { stroke: var(--text2); stroke-width: 0.5; fill: none; }
</style>
</head>
<body>
<h1>Radians ↔ Degrees</h1>

<div class="grid">
  <div class="card">
    <label>Degrees (°)</label>
    <input id="deg" type="number" value="180" oninput="fromDeg(this.value)">
  </div>
  <div class="card">
    <label>Radians (rad)</label>
    <input id="rad" type="number" value="3.14159" step="0.001" oninput="fromRad(this.value)">
  </div>
</div>

<div class="formula">
  rad = deg × π/180 &nbsp;|&nbsp; deg = rad × 180/π &nbsp;|&nbsp; π ≈ <span>3.14159</span>
</div>

<div class="angles-row" id="presets"></div>

<svg width="100%" viewBox="0 0 680 340" style="display:block">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- axes -->
  <line x1="50" y1="170" x2="330" y2="170" stroke="var(--border2)" stroke-width="0.5"/>
  <line x1="190" y1="30" x2="190" y2="310" stroke="var(--border2)" stroke-width="0.5"/>

  <!-- unit circle -->
  <circle cx="190" cy="170" r="120" fill="none" stroke="var(--border2)" stroke-width="0.5"/>

  <!-- arc (angle indicator) -->
  <path id="arc" fill="none" stroke="#EF9F27" stroke-width="2"/>

  <!-- angle line -->
  <line id="ang-line" x1="190" y1="170" x2="310" y2="170" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- reference dashed line -->
  <line x1="190" y1="170" x2="310" y2="170" stroke="var(--border2)" stroke-width="0.5" stroke-dasharray="3 3"/>

  <!-- axis labels -->
  <text class="ts" x="316" y="175">0° / 0</text>
  <text class="ts" x="175" y="26" text-anchor="middle">90° / π/2</text>
  <text class="ts" x="56"  y="175" text-anchor="middle">180° / π</text>
  <text class="ts" x="175" y="316" text-anchor="middle">270° / 3π/2</text>

  <!-- point on circle -->
  <circle id="pt" cx="310" cy="170" r="5" fill="#378ADD"/>

  <!-- angle label -->
  <text id="ang-label" class="th" x="220" y="160" fill="#EF9F27"></text>

  <!-- right side: common angles table -->
  <text class="th" x="400" y="50">Common angles</text>
  <line x1="390" y1="60" x2="660" y2="60" stroke="var(--border)" stroke-width="0.5"/>

  <text class="ts" x="400" y="80">Degrees</text>
  <text class="ts" x="510" y="80">Radians</text>
  <text class="ts" x="610" y="80">Fraction</text>
  <line x1="390" y1="88" x2="660" y2="88" stroke="var(--border)" stroke-width="0.5"/>

  <text class="t" x="400" y="108">0°</text>   <text class="t" x="510" y="108">0</text>       <text class="t" x="610" y="108">0</text>
  <text class="t" x="400" y="134">30°</text>  <text class="t" x="510" y="134">0.5236</text>  <text class="t" x="610" y="134">π/6</text>
  <text class="t" x="400" y="160">45°</text>  <text class="t" x="510" y="160">0.7854</text>  <text class="t" x="610" y="160">π/4</text>
  <text class="t" x="400" y="186">60°</text>  <text class="t" x="510" y="186">1.0472</text>  <text class="t" x="610" y="186">π/3</text>
  <text class="t" x="400" y="212">90°</text>  <text class="t" x="510" y="212">1.5708</text>  <text class="t" x="610" y="212">π/2</text>
  <text class="t" x="400" y="238">120°</text> <text class="t" x="510" y="238">2.0944</text>  <text class="t" x="610" y="238">2π/3</text>
  <text class="t" x="400" y="264">180°</text> <text class="t" x="510" y="264">3.1416</text>  <text class="t" x="610" y="264">π</text>
  <text class="t" x="400" y="290">270°</text> <text class="t" x="510" y="290">4.7124</text>  <text class="t" x="610" y="290">3π/2</text>
  <text class="t" x="400" y="316">360°</text> <text class="t" x="510" y="316">6.2832</text>  <text class="t" x="610" y="316">2π</text>
</svg>

<script>
const presets = [0,30,45,60,90,120,135,150,180,270,360];
const row = document.getElementById('presets');
presets.forEach(d => {
  const b = document.createElement('button');
  b.className = 'ang-btn';
  b.textContent = d + '°';
  b.onclick = () => { document.getElementById('deg').value = d; fromDeg(d); };
  row.appendChild(b);
});

function updateCircle(deg) {
  const r = 120, cx = 190, cy = 170;
  const rad = deg * Math.PI / 180;
  const x = cx + r * Math.cos(-rad);
  const y = cy + r * Math.sin(-rad);

  document.getElementById('pt').setAttribute('cx', x.toFixed(2));
  document.getElementById('pt').setAttribute('cy', y.toFixed(2));
  document.getElementById('ang-line').setAttribute('x2', x.toFixed(2));
  document.getElementById('ang-line').setAttribute('y2', y.toFixed(2));

  const arcR = 36;
  const ex = cx + arcR * Math.cos(-rad);
  const ey = cy + arcR * Math.sin(-rad);
  const large = deg > 180 ? 1 : 0;
  const d = deg === 0 ? '' : `M ${cx + arcR} ${cy} A ${arcR} ${arcR} 0 ${large} 0 ${ex.toFixed(2)} ${ey.toFixed(2)}`;
  document.getElementById('arc').setAttribute('d', d);

  const lx = cx + 52 * Math.cos(-rad * 0.5);
  const ly = cy + 52 * Math.sin(-rad * 0.5);
  document.getElementById('ang-label').setAttribute('x', lx.toFixed(1));
  document.getElementById('ang-label').setAttribute('y', ly.toFixed(1));
  document.getElementById('ang-label').textContent = (deg % 360 === 0 && deg !== 0) ? '' : Math.round(deg) + '°';
}

function fromDeg(v) {
  const d = parseFloat(v) || 0;
  document.getElementById('rad').value = parseFloat((d * Math.PI / 180).toFixed(5));
  updateCircle(d);
}

function fromRad(v) {
  const r = parseFloat(v) || 0;
  document.getElementById('deg').value = parseFloat((r * 180 / Math.PI).toFixed(4));
  updateCircle(r * 180 / Math.PI);
}

updateCircle(180);
</script>
</body>
</html>
