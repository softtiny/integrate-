<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		*{
			padding:0;
			margin:0;
			outline:none;
			border:0;
		}
		table {
		  border-collapse: collapse;  /* 方案 1: 合并边框 */
		  /* 或 */
		  border-spacing: 0;           /* 方案 2: 显式关闭间距 */
		}

		tr,td{
			margin:0;
			outline:none;
			border:none;
		}
		.box{
			position: relative;
			display: flex;
			justify-content: space-between;
			& td {
				font-size: 32px;
				width: 80px;
				height: 80px;
				text-align: center;
			}
			& .bar{
				pointer-events: none;
				position:absolute;
				left: 40px;
				
				top:0;
				width: 540px;
				height: 60px;
				border: 1px solid #3B82F6;
				border-radius: 9999px;
				transform:rotate(45deg);
				transform-origin:left top;
			}
			& .bleft1 {
				left: 120px;
			}
			& .bleft2 {
				left: 200px;
			}
			& .bleft3 {
				left: 280px;
			}
			& .bleft4 {
				left: 360px;
			}
			& .bar2{
				pointer-events: none;
				position:absolute;
				left: 60px;
				
				top:370px;
				width: 540px;
				height: 60px;
				border: 1px solid #EA4F16;
				border-radius: 9999px;
				transform:rotate(-45deg);
				transform-origin:left top;
			}
			& .bright1{
				left: 140px;
			}
			& .bright2{
				left: 220px;
			}
			& .bright3{
				left: 300px;
			}
			& .bright4{
				left: 380px;
			}
		}
		aside{
			& .page{
				display:flex;
				
			}
			& .gap2{
				padding-top: 80px;
			}
			& .records_add_sum,.records_minus_sum{
				text-align: center;	
				line-height: 55px;	
				border-bottom: 1px solid #000;
			}
		}
		dl {
			width: 100px;
			border: 1px solid #3fb950;
			
			text-align: center;
			& dt {
				font-size:22px;
				font-weight: bold;
				border-bottom: 1px solid #3fb950;
				line-height: 50px;
			}
			& dd {
				height: 50px;
				line-height: 50px;
				poistion: relative;
				
			}
			& dd.cur::after {
				position: absoulte;
				left:0;
				top: 0;
				content: " ";
				display: block;
				box-sizing: border-box;
				width: 100%;
				height: 100%;
				border: 2px solid #ffd343;
			}
		}
		.bot {
			padding: 30px;
			& .info {
				& .col {
					width: 100px;
					height: 100px;
					& .col-num {
						height: 80px;
						line-height: 80px;
						font-size: 24px;
						text-align: center;
					}
					& .line {
						width:  100%px;
						height: 2px;
						background-color:  #000;
					}
				}
			}
			& .sign {font-size: 40px;padding: 0 20px;}
		}
	</style>
</head>
<body>
	<div class="box">
		<table id="matrix">
			<tr>
				<td>1</td>
				<td>2</td>
				<td>3</td>
				<td>4</td>
				<td>5</td>
				<td>1</td>
				<td>2</td>
				<td>3</td>
				<td>4</td>
				<td>5</td>
			</tr>
			<tr>
				<td>6</td>
				<td>7</td>
				<td>8</td>
				<td>9</td>
				<td>10</td>
				<td>6</td>
				<td>7</td>
				<td>8</td>
				<td>9</td>
				<td>10</td>
			</tr>
			<tr>
				<td>11</td>
				<td>12</td>
				<td>13</td>
				<td>14</td>
				<td>15</td>
				<td>11</td>
				<td>12</td>
				<td>13</td>
				<td>14</td>
				<td>15</td>
			</tr>
			<tr>
				<td>16</td>
				<td>17</td>
				<td>18</td>
				<td>19</td>
				<td>20</td>
				<td>16</td>
				<td>17</td>
				<td>18</td>
				<td>19</td>
				<td>20</td>
			</tr>
			<tr>
				<td>21</td>
				<td>22</td>
				<td>23</td>
				<td>24</td>
				<td>25</td>
				<td>21</td>
				<td>22</td>
				<td>23</td>
				<td>24</td>
				<td>25</td>
			</tr>
		</table>
		<div class="bar2" id="bar"></div>
		<aside>
			<div class="gap">
				<div class="page" id="records_add">
					<dl>
						<dt>+1</dt>
						<dd></dd>
					</dl>
					<dl>
						<dt>+2</dt>
						<dd></dd>
					</dl>
					<dl>
						<dt>+3</dt>
						<dd></dd>
					</dl>
					<dl>
						<dt>+4</dt>
						<dd></dd>
					</dl>
					<dl>
						<dt>+5</dt>
						<dd></dd>
					</dl>
				</div>
				<div class="records_add_sum">0</div>
			</div>
			<div class="gap gap2">
				<div class="page" id="records_minus">
					<dl>
						<dt>-1</dt>
						<dd></dd>
					</dl>
					<dl>
						<dt>-2</dt>
						<dd></dd>
					</dl>
					<dl>
						<dt>-3</dt>
						<dd></dd>
					</dl>
					<dl>
						<dt>-4</dt>
						<dd></dd>
					</dl>
					<dl>
						<dt>-5</dt>
						<dd></dd>
					</dl>
				</div>
				<div class="records_minus_sum">0</div>
			</div>
		</aside>
	</div>
	<div class="bot">
		<table class="info">
			<tr>
				<td>
					<div class="col">
						<div class="col-num"></div>
						<div class="line"></div>
					</div>
				</td>
				<td><div class="sign">+</div></td>
				<td>
					<div class="col">
						<div class="col-num"></div>
						<div class="line"></div>
					</div>
				</td>
				<td><div class="sign">+</div></td>
				<td>
					<div class="col">
						<div class="col-num"></div>
						<div class="line"></div>
					</div>
				</td>
				<td><div class="sign">+</div></td>
				<td>
					<div class="col">
						<div class="col-num"></div>
						<div class="line"></div>
					</div>
				</td>
				<td><div class="sign">+</div></td>
				<td>
					<div class="col">
						<div class="col-num"></div>
						<div class="line"></div>
					</div>
				</td>
				<td><div class="sign">=</div></td>
				<td>
					<div class="col">
						<div class="col-num"></div>
						<div class="line"></div>
					</div>
				</td>
			</tr>
		</table>
	</div>
<script>
window.onload=function(){
	var records_add = document.querySelector("#records_add")
	var records_add_dds=records_add.querySelectorAll("dd")
	var records_add_sum = records_add.nextElementSibling;
	var records_minus = document.querySelector("#records_minus")
	var records_minus_dds=records_minus.querySelectorAll("dd")
	var records_minus_sum = records_minus.nextElementSibling;
	var bar = document.querySelector("#bar")
	var table = document.querySelector("table#matrix")
	var info = document.querySelector('table.info')
	var info_col_num = info.querySelectorAll('.col-num')
	var trs = table.querySelectorAll('tr')
	var top_tds = Array.from( trs[0].querySelectorAll('td') )
	trs[0].addEventListener('click',function(event){
		let item = event.target
		focus_seg(top_tds.indexOf(item))
	})
	var colors = [
		"#3B82F6",
		"#EF4444",
		"#10B981",
		"#F59E0B",
		"#8B5CF6",
		"#475569",
		"#EC4899",
		"#06B6D4",
		"#78350F",
		"#84A59D",
	]
	var struct = {
		add:[],
		add_sums:[],
		minus:[],
		minus_sums:[],
		cur:null,
		add_records:[],
		minus_records:[],
	}
	function focus_seg(idx){
		struct.cur = idx
		if(idx>4){
			idx -= 5
			info_col_num[5].innerHTML=struct.minus_sums[idx]
			struct.minus[idx].map((val,pos)=>{
				info_col_num[pos].innerHTML=val
			})
			bar.className = ""
			bar.classList.add('bar2','bright'+idx)
			if(!struct.minus_records.includes(idx)){
				struct.minus_records.push(idx)
			}
		}else{
			info_col_num[5].innerHTML=struct.add_sums[idx]
			struct.add[idx].map((val,pos)=>{
				info_col_num[pos].innerHTML=val
			})
			bar.className = ""
			bar.classList.add('bar','bleft'+idx)
			if(!struct.add_records.includes(idx)){
				struct.add_records.push(idx)
			}
		}
		let sumadd=0
		struct.add_records.map((item)=>{
			let linesum = struct.add_sums[item]
			records_add_dds[item].innerHTML=linesum
			sumadd+=linesum
		})
		records_add_sum.innerHTML=sumadd
		let summinus = 0
		struct.minus_records.map((item)=>{
			let linesum = struct.minus_sums[item]
			records_minus_dds[item].innerHTML=linesum
			summinus+=linesum
		})
		records_minus_sum.innerHTML=summinus
	}
	let aaaa = [1,2,3,4,5].map((num)=>{
		let arr = [0,1,2,3,4].map((ext)=>{
			return [num+ext,1+ext]
		})
		arr = arr.map(([tdext,trext])=>{
			let td = tdext-1
			let tr = trext-1
			let cols = trs[tr].querySelectorAll("td")
			let col = cols[td]
			let res = +col.innerText.trim()
			return res
		})
		console.log(arr)
		struct.add.push(arr)
		let sum = arr.reduce((c,n)=>c*n,1)
		struct.add_sums.push(sum)
		console.log(sum)
		return sum
	})
	let plus = aaaa.reduce((c,n)=>c+n,0);
	console.log(plus)
	aaaa = [6,7,8,9,10].map((num)=>{
		let arr = [0,1,2,3,4].map((ext)=>{
			return [ num-ext,1+ext]
		})
		arr = arr.map(([tdext,trext])=>{
			let td = tdext-1
			let tr = trext-1
			let cols = trs[tr].querySelectorAll("td")
			let col = cols[td]
			let res = +col.innerText.trim()
			return res
		})
		struct.minus.push(arr)
		console.log(arr)
		let sum = arr.reduce((c,n)=>c*n,1)
		struct.minus_sums.push(sum)
		console.log(sum)
		return sum
	})
	let minus = aaaa.reduce((c,n)=>c+n,0)
	console.log(minus)
	console.log(plus,minus)
}
</script>
</body>
</html>
